<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form MSV Internet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-xl bg-white rounded-2xl shadow-xl p-6 space-y-4">

  <h1 class="text-2xl font-bold text-center text-green-600">
    Pasang / Migrasi Internet 🚀
  </h1>

  <p class="text-center text-gray-500 text-sm">
    Mulai 100rb • Cepat • Stabil
  </p>

  <select id="mode" class="p-3 border rounded-lg w-full">
    <option value="baru">Pendaftaran Baru</option>
    <option value="migrasi">Migrasi Paket</option>
  </select>

  <input id="nama" placeholder="Nama Lengkap" class="p-3 border rounded-lg w-full">
  <input id="email" type="email" placeholder="Email" class="p-3 border rounded-lg w-full">
  <input id="nomor" placeholder="No WhatsApp" class="p-3 border rounded-lg w-full">
  <input id="alamat" placeholder="Alamat Lengkap" class="p-3 border rounded-lg w-full">

  <input id="jadwal" placeholder="Jadwal Pemasangan (contoh: Senin, 10.00)" class="p-3 border rounded-lg w-full">

  <select id="pernah" class="p-3 border rounded-lg w-full">
    <option value="Ya">Pernah Pasang</option>
    <option value="Tidak">Belum Pernah</option>
  </select>

  <!-- ID lama (khusus migrasi) -->
  <input id="idLama" placeholder="Masukkan ID Pelanggan Lama (khusus migrasi)" class="p-3 border rounded-lg w-full hidden">

  <select id="layanan" class="p-3 border rounded-lg w-full">
    <option>Reguler</option>
    <option>Hemat</option>
  </select>

  <select id="paket" class="p-3 border rounded-lg w-full"></select>

  <input id="harga" readonly class="p-3 border rounded-lg bg-gray-100 w-full">

  <textarea id="catatan" placeholder="Catatan tambahan (opsional)" class="p-3 border rounded-lg w-full"></textarea>

  <button id="kirim" class="bg-green-500 hover:bg-green-600 text-white p-3 rounded-lg font-bold w-full">
    🚀 Kirim via WhatsApp
  </button>

</div>

<script>
const modeSelect = document.getElementById('mode');
const layananSelect = document.getElementById('layanan');
const paketSelect = document.getElementById('paket');
const hargaInput = document.getElementById('harga');
const idInput = document.getElementById('idLama');

const paketHarga = {
  baru: {
    Reguler: {
      'MSV Family - 10 Mbps': 'Rp 100.000',
      'MSV Biz - 20 Mbps': 'Rp 165.000',
      'MSV Max - 30 Mbps': 'Rp 195.000',
      'MSV Stream - 50 Mbps': 'Rp 225.000',
      'MSV Pro - 100 Mbps': 'Rp 300.000'
    },
    Hemat: {
      'MSV Stream Hemat - 50 Mbps': 'Rp 125.000',
      'MSV Pro Hemat - 100 Mbps': 'Rp 165.000'
    }
  },
  migrasi: {
    '10 Mbps': 'Rp 100.000',
    '20 Mbps': 'Rp 165.000',
    '30 Mbps': 'Rp 195.000',
    '50 Mbps': 'Rp 225.000',
    '100 Mbps': 'Rp 300.000',
    'HEMAT 50 Mbps': 'Rp 125.000',
    'HEMAT 100 Mbps': 'Rp 165.000'
  }
};

function updatePaketOptions() {
  const mode = modeSelect.value;
  paketSelect.innerHTML = '';

  let options = {};

  if (mode === 'baru') {
    layananSelect.style.display = 'block';
    options = paketHarga.baru[layananSelect.value];
  } else {
    layananSelect.style.display = 'none';
    options = paketHarga.migrasi;
  }

  for (let paket in options) {
    let opt = document.createElement('option');
    opt.value = paket;
    opt.text = paket;
    paketSelect.appendChild(opt);
  }

  hargaInput.value = options[paketSelect.value] || '';
}

function toggleIdField() {
  if (modeSelect.value === 'migrasi') {
    idInput.classList.remove('hidden');
    idInput.setAttribute('required','required');
  } else {
    idInput.classList.add('hidden');
    idInput.removeAttribute('required');
    idInput.value = '';
  }
}

modeSelect.addEventListener('change', () => {
  toggleIdField();
  updatePaketOptions();
});
layananSelect.addEventListener('change', updatePaketOptions);

paketSelect.addEventListener('change', () => {
  const mode = modeSelect.value;
  if (mode === 'baru') {
    hargaInput.value = paketHarga.baru[layananSelect.value][paketSelect.value];
  } else {
    hargaInput.value = paketHarga.migrasi[paketSelect.value];
  }
});

updatePaketOptions();
toggleIdField();

// Generate ID
function generateCustomerID() {
  const d = new Date();
  const y = d.getFullYear().toString().slice(-2);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  const rand = Math.floor(1000 + Math.random()*9000);
  return `MSV-${y}${m}${day}-${rand}`;
}

// GANTI dengan URL Web App kamu
const WEBAPP_URL = https://script.google.com/macros/s/AKfycbx8vLx40aHwKqfYcrBuVJ95ahl-P2F4xBKrDGsYJyMx13qsbmMmWO2FW3eH6Zw_V5Fx/exec;

// Submit

document.getElementById('kirim').addEventListener('click', async () => {
  let customerID = '';
  const mode = modeSelect.value;

  if (mode === 'migrasi') {
    const idVal = idInput.value.trim();

    if (!idVal) {
      alert('Mohon isi ID Pelanggan Lama');
      idInput.focus();
      return;
    }

    const format = /^MSV-\d{6}-\d{4}$/;
    if (!format.test(idVal)) {
      alert('Format ID salah! Contoh: MSV-240504-1234');
      idInput.focus();
      return;
    }

    // cek ke Google Sheets
    try {
      const res = await fetch(`${https://script.google.com/macros/s/AKfycbx8vLx40aHwKqfYcrBuVJ95ahl-P2F4xBKrDGsYJyMx13qsbmMmWO2FW3eH6Zw_V5Fx/exec}?id=${idVal}`);
      const txt = await res.text();
      if (txt !== 'FOUND') {
        alert('ID tidak ditemukan di database!');
        return;
      }
    } catch {
      alert('Gagal cek ID');
      return;
    }

    customerID = idVal;
  } else {
    customerID = generateCustomerID();
  }

  const nama = document.getElementById('nama').value;
  const email = document.getElementById('email').value;
  const nomor = document.getElementById('nomor').value;
  const alamat = document.getElementById('alamat').value;
  const jadwal = document.getElementById('jadwal').value;
  const pernah = document.getElementById('pernah').value;
  const paket = paketSelect.value;
  const harga = hargaInput.value;
  const catatan = document.getElementById('catatan').value;

  const pesan = `ID Pelanggan: ${customerID}\nMode: ${mode}\nNama: ${nama}\nEmail: ${email}\nNo: ${nomor}\nAlamat: ${alamat}\nPaket: ${paket}\nHarga: ${harga}\nJadwal: ${jadwal}\nStatus: ${pernah}\nCatatan: ${catatan}`;

  // simpan ke Sheets
  fetch(https://script.google.com/macros/s/AKfycbx8vLx40aHwKqfYcrBuVJ95ahl-P2F4xBKrDGsYJyMx13qsbmMmWO2FW3eH6Zw_V5Fx/exec, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      id: customerID,
      nama, email, nomor, alamat,
      mode,
      layanan: (mode==='baru'?layananSelect.value:'-'),
      paket, harga, jadwal, pernah, catatan
    })
  });

  // buka WA
  window.open(`https://wa.me/6281345001401?text=${encodeURIComponent(pesan)}`,'_blank');
});

</script>

</body>
</html>
