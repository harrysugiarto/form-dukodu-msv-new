<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form MSV Internet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-xl bg-white rounded-2xl shadow-xl p-6 space-y-4">

  <h1 class="text-2xl font-bold text-center text-green-600">
    Pasang / Migrasi Internet 🚀
  </h1>

  <p class="text-center text-gray-500 text-sm">
    Mulai 100rb • Cepat • Stabil
  </p>

  <select id="mode" class="p-3 border rounded-lg w-full">
    <option value="baru">Pendaftaran Baru</option>
    <option value="migrasi">Migrasi Paket</option>
  </select>

  <input id="nama" placeholder="Nama Lengkap" class="p-3 border rounded-lg w-full">
  <input id="email" type="email" placeholder="Email" class="p-3 border rounded-lg w-full">
  <input id="nomor" placeholder="No WhatsApp" class="p-3 border rounded-lg w-full">
  <input id="alamat" placeholder="Alamat Lengkap" class="p-3 border rounded-lg w-full">

  <input id="jadwal" placeholder="Jadwal Pemasangan (contoh: Senin, 10.00)" class="p-3 border rounded-lg w-full">

  <select id="pernah" class="p-3 border rounded-lg w-full">
    <option value="Ya">Pernah Pasang</option>
    <option value="Tidak">Belum Pernah</option>
  </select>

  <select id="layanan" class="p-3 border rounded-lg w-full">
    <option>Reguler</option>
    <option>Hemat</option>
  </select>

  <select id="paket" class="p-3 border rounded-lg w-full"></select>

  <input id="harga" readonly class="p-3 border rounded-lg bg-gray-100 w-full">

  <button id="kirim" class="bg-green-500 hover:bg-green-600 text-white p-3 rounded-lg font-bold w-full">
    🚀 Kirim via WhatsApp
  </button>

</div>

<script>
const modeSelect = document.getElementById('mode');
const layananSelect = document.getElementById('layanan');
const paketSelect = document.getElementById('paket');
const hargaInput = document.getElementById('harga');

const paketHarga = {
  baru: {
    Reguler: {
      'MSV Lite - 5 Mbps': 'Rp 100.000',
      'MSV Family - 10 Mbps': 'Rp 150.000',
      'MSV Biz - 15 Mbps': 'Rp 180.000',
      'MSV Max - 20 Mbps': 'Rp 200.000',
      'MSV Stream - 30 Mbps': 'Rp 250.000',
      'MSV Pro - 50 Mbps': 'Rp 350.000'
    },
    Hemat: {
      'MSV Max Hemat - 20 Mbps': 'Rp 165.000',
      'MSV Stream Hemat - 30 Mbps': 'Rp 195.000',
      'MSV Pro Hemat - 50 Mbps': 'Rp 225.000'
    }
  },
  migrasi: {
    '10 Mbps': 'Rp 100.000',
    '20 Mbps': 'Rp 165.000',
    '30 Mbps': 'Rp 195.000',
    '50 Mbps': 'Rp 225.000',
    '100 Mbps': 'Rp 300.000',
    'HEMAT 50 Mbps': 'Rp 125.000',
    'HEMAT 100 Mbps': 'Rp 165.000'
  }
};

function updatePaketOptions() {
  const mode = modeSelect.value;
  paketSelect.innerHTML = '';

  let options = {};

  if (mode === 'baru') {
    layananSelect.style.display = 'block';
    options = paketHarga.baru[layananSelect.value];
  } else {
    layananSelect.style.display = 'none';
    options = paketHarga.migrasi;
  }

  for (let paket in options) {
    let opt = document.createElement('option');
    opt.value = paket;
    opt.text = paket;
    paketSelect.appendChild(opt);
  }

  hargaInput.value = options[paketSelect.value];
}

modeSelect.addEventListener('change', updatePaketOptions);
layananSelect.addEventListener('change', updatePaketOptions);

paketSelect.addEventListener('change', () => {
  const mode = modeSelect.value;

  if (mode === 'baru') {
    hargaInput.value = paketHarga.baru[layananSelect.value][paketSelect.value];
  } else {
    hargaInput.value = paketHarga.migrasi[paketSelect.value];
  }
});

updatePaketOptions();

// Generate ID Pelanggan
function generateCustomerID() {
  const date = new Date();
  const y = date.getFullYear().toString().slice(-2);
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  const rand = Math.floor(1000 + Math.random() * 9000);
  return `MSV-${y}${m}${d}-${rand}`;
}

// Kirim WA

document.getElementById('kirim').addEventListener('click', () => {
  const customerID = generateCustomerID();
  const nama = document.getElementById('nama').value;
  const email = document.getElementById('email').value;
  const nomor = document.getElementById('nomor').value;
  const alamat = document.getElementById('alamat').value;
  const jadwal = document.getElementById('jadwal').value;
  const pernah = document.getElementById('pernah').value;
  const paket = paketSelect.value;
  const harga = hargaInput.value;
  const mode = modeSelect.value;

  let pesan = '';

  if (mode === 'migrasi') {
    pesan = `ID Pelanggan: ${customerID}
Halo, saya ingin MIGRASI paket\nNama: ${nama}\nEmail: ${email}\nNo: ${nomor}\nAlamat: ${alamat}\nPaket: ${paket}\nHarga: ${harga}\nJadwal: ${jadwal}\nStatus: ${pernah}`;
  } else {
    pesan = `ID Pelanggan: ${customerID}
Halo, saya ingin PASANG BARU\nNama: ${nama}\nEmail: ${email}\nNo: ${nomor}\nAlamat: ${alamat}\nPaket: ${paket}\nHarga: ${harga}\nJadwal: ${jadwal}\nPernah Pasang: ${pernah}`;
  }

  const url = `https://wa.me/6281345001401?text=${encodeURIComponent(pesan)}`;
  window.open(url, '_blank');
});

</script>

</body>
</html>
